<div style="padding: 20px;">
  <h1 style="color: #ce1126;">Our Menu (Live Data)</h1>

  <input
    [formControl]="searchControl"
    placeholder="🔎 Search for a dish..."
    style="padding: 12px; width: 100%; border: 2px solid #ddd; margin-bottom: 20px; border-radius: 5px;">

  <div *ngIf="filteredPosts$ | async as posts">
    <div *ngFor="let post of posts" style="background: white; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-radius: 8px;">

      <h3 style="margin: 0; color: #333;">{{ post.title | titlecase }}</h3>

      <p style="color: #666;">{{ post.body | truncate:80 }}</p>

      <button style="background: #ce1126; color: white; border: none; padding: 5px 15px; cursor: pointer;">Order Now</button>
    </div>
  </div>
</div>
