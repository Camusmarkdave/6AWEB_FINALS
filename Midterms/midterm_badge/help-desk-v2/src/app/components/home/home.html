<div class="hero">
  <h1> Lion City Feasts</h1>
  <p>Experience the authentic taste of Singapore. From our wok to your table.</p>
</div>

<div class="specials-container">
  <div class="section-header">
    <h2> Chef's Daily Selection</h2>
    <p>Curated specials featuring fresh ingredients and bold flavors.</p>
  </div>

  <div *ngIf="posts$ | async as posts; else loading">
    <div *ngFor="let post of posts | slice:0:5; let i = index" class="special-card">

      <div class="card-image">
        <img [src]="getImage(i)" alt="Delicious Food">
      </div>

      <div class="card-content">
        <h3>{{ post.title | titlecase }}</h3>
        <p>{{ post.body }}</p>
        <button class="order-link">View Details &rarr;</button>
      </div>

    </div>
  </div>

  <ng-template #loading>
    <div class="loading-state">
      <p> Firing up the wok... (Loading Menu)</p>
    </div>
  </ng-template>
</div>
