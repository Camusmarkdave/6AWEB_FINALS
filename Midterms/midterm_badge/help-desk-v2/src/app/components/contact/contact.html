<div style="padding: 20px; display: flex; gap: 40px;">

  <div style="flex: 1;">
    <h1 style="color: #ce1126;">Reserve a Table</h1>
    <form (ngSubmit)="submit()">
      <div style="margin-bottom: 15px;">
        <label>Name:</label><br>
        <input [(ngModel)]="formData.name" name="name" required style="width: 100%; padding: 8px;">
      </div>

      <div style="margin-bottom: 15px;">
        <label>Email:</label><br>
        <input [(ngModel)]="formData.email" name="email" required style="width: 100%; padding: 8px;">
      </div>

      <div style="margin-bottom: 15px;">
        <label>Message:</label><br>
        <textarea [(ngModel)]="formData.message" name="message" rows="4" style="width: 100%; padding: 8px;"></textarea>
      </div>

      <button style="background: #ce1126; color: white; border: none; padding: 10px 20px; font-size: 1rem; cursor: pointer;">Confirm Reservation</button>
    </form>
  </div>

  <div style="flex: 1; background: #fff8dc; padding: 20px; border: 2px dashed #ce1126; height: fit-content;">
    <h2>Reservation Ticket</h2>
    <p><strong>GUEST:</strong> {{ formData.name | uppercase }}</p>
    <p><strong>CONTACT:</strong> {{ formData.email }}</p>
    <p><strong>NOTES:</strong> {{ formData.message }}</p>
  </div>

</div>
